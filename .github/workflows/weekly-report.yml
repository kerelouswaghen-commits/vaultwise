name: Weekly Financial Report

on:
  schedule:
    # Every Tuesday at 7 PM UTC (11 AM PST)
    - cron: '0 19 * * 2'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (generate but do not send)'
        required: false
        default: 'false'
        type: boolean

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Write config_private.py
        run: |
          echo "$CONFIG_PRIVATE_PY" > config_private.py
        env:
          CONFIG_PRIVATE_PY: ${{ secrets.CONFIG_PRIVATE_PY }}

      - name: Generate and send weekly report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python send_weekly_report.py --dry-run
          else
            python send_weekly_report.py --telegram-only
          fi
