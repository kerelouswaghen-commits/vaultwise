[server]
enableStaticServing = true
maxUploadSize = 50

[theme]
# Clean modern finance look — light background with accent colors
base = "light"
primaryColor = "#0066FF"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F5F7FA"
textColor = "#1A1A2E"
font = "sans serif"

[client]
showErrorDetails = false

[browser]
gatherUsageStats = false
